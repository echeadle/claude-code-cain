<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Add User — prototype_2</title>
</head>
<body>
  <h1>Add User</h1>
  <form method="post" action="/users">

    <input type="text" id="username" name="username" required><br><br>

    <button type="submit">Add User</button>
  </form>
  <p><a href="/">Back home</a></p>
</body>
</html>

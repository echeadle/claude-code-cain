<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RadioCalico — Live Stream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="backdrop"></div>

  <div class="page">
    <header class="hero">
      <div class="logo-circle">🐾</div>
      <h1>RadioCalico</h1>
      <p class="tagline">24-bit / 48kHz lossless &middot; ad-free &middot; data-free</p>
      <button id="listen-btn" class="btn-primary">▶ Listen Now</button>
      <audio id="player" controls></audio>
      <p id="status">Loading stream…</p>
    </header>

    <main>
      <section class="now-playing card">
        <h2>Now Playing</h2>
        <div class="now-playing-body">
          <img id="np-cover" alt="Album art" src="">
          <div class="np-info">
            <p id="np-title" class="np-title">—</p>
            <p id="np-artist" class="np-artist"></p>
            <p id="np-album" class="np-album"></p>
            <div class="rating">
              <button id="thumbs-up" class="thumb-btn" type="button" aria-label="Thumbs up">
                👍 <span id="thumbs-up-count">0</span>
              </button>
              <button id="thumbs-down" class="thumb-btn" type="button" aria-label="Thumbs down">
                👎 <span id="thumbs-down-count">0</span>
              </button>
              <span id="rating-status" class="rating-status"></span>
            </div>
          </div>
        </div>
      </section>

      <section class="recently-played card">
        <h2>Recently Played</h2>
        <ol id="rp-list"></ol>
      </section>
    </main>

    <footer>
      <p>RadioCalico — kick back, enjoy the crystal-clear audio.</p>
    </footer>
  </div>

  <script src="/vendor/hls.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
